# Zeus — QLoRA fine-tuning config (Gemma-2-2B-it intent router)
# Illustrative reference configuration from the MSC Labs training harness.

model:
  base_model: google/gemma-2-2b-it
  attn_implementation: eager          # Gemma-2 recommends eager attention
  trust_remote_code: false

# 4-bit base + LoRA adapters (QLoRA)
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/train.jsonl        # not distributed; sample in data/sample.jsonl
  eval_file: data/val.jsonl
  message_field: message
  label_field: intent
  max_seq_length: 256                 # routing inputs are short
  labels:
    - billing
    - technical_support
    - sales
    - account
    - order_status
    - feedback
    - escalate_human
    - other

training:
  output_dir: outputs/zeus-intent-router-qlora
  num_train_epochs: 3
  per_device_train_batch_size: 32     # short seqs -> large batch fits on A100 40GB
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: paged_adamw_8bit
  bf16: true
  max_grad_norm: 0.3
  logging_steps: 25
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  seed: 42

# 2-stage protocol: smoke test on 1% of data first, then the full run.
smoke_test:
  enabled: true
  sample_fraction: 0.01
  max_steps: 30
